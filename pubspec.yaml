name: joritna_mobile
description: "Privacy-first mobile platform connecting residents, property managers, and residential communities."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^16.1.0

  # Networking and secure storage
  dio: ^5.9.0
  flutter_secure_storage: ^9.2.4

  # Realtime communication
  stomp_dart_client: ^3.0.1

  # Media and external links
  image_picker: ^1.2.2
  url_launcher: ^6.3.2

  # Model generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Firebase and local notifications
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.6.0
  freezed: ^3.2.0
  json_serializable: ^6.11.0

  # Application branding
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/joritna_logo.png
  android: true
  ios: true
  web: false

  android_12:
    color: "#FFFFFF"
    image: assets/images/joritna_logo.png